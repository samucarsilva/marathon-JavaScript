<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Ateliê de Costura
    </title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="container">

        <div>
            <img class="logotipo" src="images/sewing.jpg" alt="Atelie de Costura">
        </div>

        <h2>
            Ateliê de Costura
        </h2>

        <label for="valor-servico">
            Valor do Serviço
        </label>

        <input id="valor-servico" type="text" autocomplete="off" placeholder="Insira o Valor">

        <div class="checkbox-area">

            <input id="cliente-antigo" type="checkbox">

            <label for="cliente-antigo">
                Cliente Antigo
            </label>

        </div>

        <button id="btn-verificar">
            Verificar Desconto
        </button>

        <div id="resultado">
            <br>
        </div>

    </div>

    <script src="js/scripts.js">

    </script>

</body>
</html>
